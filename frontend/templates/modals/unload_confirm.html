<!-- frontend/templates/modals/unload_confirm.html -->
{% extends "base_modal.html" %}
{% set title = "Unload Model?" %}
{% set title_class = "text-red-400" %}
{% set border_color = "red-600" %}

{% block content %}
<p class="text-sm text-gray-300 mb-6">
    Unload <span class="font-bold text-blue-400">{{ display_name }}</span>?
    This will terminate the llama.cpp instance.
</p>
<div class="flex gap-3">
    <button onclick="document.getElementById('modal').remove();"
            class="flex-1 px-4 py-2 rounded bg-gray-700 hover:bg-gray-600 text-white font-bold transition-colors">
        Cancel
    </button>
    <button hx-post="/api/trigger-unload"
            hx-vals='{"model_name": "{{ model_name }}"}'
            hx-target="#modal-container" hx-swap="innerHTML"
            class="flex-1 px-4 py-2 rounded bg-red-600 hover:bg-red-500 text-white font-bold transition-colors">
        Unload
    </button>
</div>
{% endblock %}
