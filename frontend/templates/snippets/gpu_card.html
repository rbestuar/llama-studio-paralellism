<!-- frontend/templates/snippets/gpu_card.html -->
<div class="border-2 border-gray-600 rounded p-6 bg-gray-800 w-full">
    <div>
        <h3 class="font-bold text-sm">
            GPU {{ gpu.gpu_id }} : {{ gpu.name }} : {{ gpu.power_draw|default(0)|round(0)|int }} W, {{ gpu.temperature|default('--') }} °C
        </h3>
    </div>
    <div class="text-right text-sm text-gray-200">
        <p>{{ gpu.allocated|round(1) }} / {{ gpu.memory|round(1) }} GB ({{ memory_pct|round(1) }}% used)</p>
    </div>
    <div class="relative w-full h-8 rounded overflow-hidden bg-gray-900">
        <div class="h-full rounded bg-blue-500" style="width: {{ memory_pct|round(1) }}%"></div>
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <span class="text-white font-bold text-sm drop-shadow">VRAM Usage</span>
        </div>
    </div>
</div>
